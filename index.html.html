<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEJI Communications Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B3A6B;
    --gold: #C8922A;
    --gold-light: #FDF6E3;
    --navy-light: #E8EEF7;
    --white: #ffffff;
    --gray-50: #F8F9FC;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-800: #1F2937;
    --pill-edu-bg: #E8EEF7; --pill-edu: #1B3A6B;
    --pill-adv-bg: #F3F0FF; --pill-adv: #6D28D9;
    --pill-com-bg: #E6F7F2; --pill-com: #0A7A5A;
    --pill-awa-bg: #FDF6E3; --pill-awa: #C8922A;
    --pill-org-bg: #FEF2F2; --pill-org: #B91C1C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-800); font-size: 14px; }

  /* HEADER */
  .header { background: var(--navy); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-left .eyebrow { color: var(--gold); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .header-left h1 { color: white; font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
  .tab-bar { display: flex; gap: 6px; }
  .tab { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; transition: all 0.2s; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75); }
  .tab.active { background: var(--gold); color: white; }
  .tab:hover:not(.active) { background: rgba(255,255,255,0.2); color: white; }

  /* STATS */
  .stats-bar { background: white; border-bottom: 1px solid var(--gray-200); padding: 10px 28px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .stat-num { font-size: 18px; font-weight: 700; }
  .stat-num.navy { color: var(--navy); }
  .stat-num.green { color: #059669; }
  .stat-text { font-size: 12px; color: var(--gray-500); margin-left: 4px; }
  .stat-divider { color: var(--gray-200); font-size: 18px; }
  .pillar-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pillar-pill { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; border: 2px solid transparent; }
  .pillar-pill:hover { opacity: 0.8; }
  .pillar-pill.active-filter { border-color: currentColor; }

  /* FILTERS */
  .filters { background: white; border-bottom: 1px solid var(--gray-200); padding: 10px 28px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-select { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--gray-200); font-size: 12px; color: var(--gray-800); font-family: 'DM Sans', sans-serif; background: white; cursor: pointer; }
  .clear-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--gray-200); background: var(--gray-100); font-size: 12px; color: var(--gray-500); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .clear-btn:hover { background: var(--gray-200); }

  /* MAIN */
  .main { padding: 20px 28px; }

  /* CALENDAR VIEW */
  .week-label { font-size: 11px; font-weight: 700; color: var(--navy); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .week-block { margin-bottom: 20px; }
  .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 8px; }
  .day-col { background: white; border-radius: 10px; border: 1px solid var(--gray-200); min-height: 90px; overflow: hidden; }
  .day-header { padding: 5px 8px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200); font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 1px; }
  .day-body { padding: 6px; display: flex; flex-direction: column; gap: 5px; }
  .post-card { padding: 6px 7px; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; border-left: 3px solid; }
  .post-card:hover { opacity: 0.8; }
  .post-card-channel { font-size: 9px; font-weight: 700; margin-bottom: 2px; }
  .post-card-title { font-size: 10px; color: var(--gray-800); line-height: 1.3; margin-bottom: 3px; }
  .post-card-status { font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: 700; display: inline-block; }
  .add-btn { border: 1.5px dashed var(--gray-200); border-radius: 6px; padding: 4px 0; background: transparent; color: var(--gray-400); font-size: 10px; cursor: pointer; width: 100%; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .add-btn:hover { border-color: var(--navy); color: var(--navy); }

  /* LIST VIEW */
  .list-table { background: white; border-radius: 12px; border: 1px solid var(--gray-200); overflow: hidden; width: 100%; }
  .list-table table { width: 100%; border-collapse: collapse; }
  .list-table th { padding: 9px 12px; text-align: left; font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); }
  .list-table td { padding: 9px 12px; border-bottom: 1px solid #F9FAFB; font-size: 12px; }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tr:hover td { background: var(--gray-50); }
  .week-badge { font-size: 11px; font-weight: 700; color: var(--navy); }
  .status-select { font-size: 10px; padding: 3px 6px; border-radius: 5px; font-family: 'DM Sans', sans-serif; font-weight: 700; cursor: pointer; border-width: 1px; border-style: solid; }
  .view-btn { background: none; border: 1px solid var(--gray-200); border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--gray-500); font-family: 'DM Sans', sans-serif; }
  .view-btn:hover { background: var(--gray-100); }

  /* KEY DATES VIEW */
  .key-dates-tip { background: var(--gold-light); border: 1px solid var(--gold); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #92400E; }
  .kd-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .kd-card { background: white; border-radius: 10px; padding: 14px 16px; display: flex; gap: 12px; align-items: center; border: 1px solid var(--gray-200); }
  .kd-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .kd-label { font-size: 13px; font-weight: 700; color: var(--navy); }
  .kd-date { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
  .kd-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; margin-top: 5px; display: inline-block; }
  .kd-tip { margin-top: 20px; padding: 14px 18px; background: var(--navy-light); border-radius: 10px; font-size: 12px; color: var(--navy); line-height: 1.6; }

  /* LEGEND */
  .legend { background: white; border-radius: 10px; border: 1px solid var(--gray-200); padding: 12px 18px; margin-top: 20px; }
  .legend-title { font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .legend-pills { display: flex; gap: 8px; flex-wrap: wrap; }

  /* MODAL OVERLAY */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; width: 100%; max-width: 440px; padding: 26px; box-shadow: 0 24px 64px rgba(0,0,0,0.2); animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .modal-pillar-tag { font-size: 11px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--gray-400); line-height: 1; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--navy); line-height: 1.4; margin-bottom: 12px; font-family: 'Playfair Display', serif; }
  .modal-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .meta-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: var(--navy-light); color: var(--navy); font-weight: 600; }
  .modal-notes { font-size: 12px; color: var(--gray-500); line-height: 1.6; background: var(--gray-50); padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; }
  .status-label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .status-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .status-btn { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .delete-btn { width: 100%; padding: 9px; border-radius: 8px; border: 1px solid #FEE2E2; background: #FFF5F5; color: #DC2626; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .delete-btn:hover { background: #FEE2E2; }

  /* ADD MODAL */
  .form-label { font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
  .form-input { width: 100%; padding: 9px 11px; border-radius: 8px; border: 1px solid var(--gray-200); font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--gray-800); margin-bottom: 12px; }
  .form-input:focus { outline: none; border-color: var(--navy); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .submit-btn { width: 100%; padding: 11px; border-radius: 8px; border: none; background: var(--navy); color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
  .submit-btn:hover { background: #152d55; }
  .empty-state { padding: 32px; text-align: center; color: var(--gray-400); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="eyebrow">CEJI — A Jewish Contribution to an Inclusive Europe</div>
    <h1>Communications Calendar</h1>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchView('calendar')">📅 Calendar</button>
    <button class="tab" onclick="switchView('list')">📋 List</button>
    <button class="tab" onclick="switchView('keydates')">🗓 Key Dates</button>
  </div>
</div>

<div class="stats-bar">
  <div>
    <span class="stat-num navy" id="total-count">0</span>
    <span class="stat-text">posts planned</span>
    <span class="stat-divider" style="margin:0 10px">|</span>
    <span class="stat-num green" id="pub-count">0</span>
    <span class="stat-text">published</span>
  </div>
  <div class="pillar-pills" id="pillar-pills"></div>
</div>

<div class="filters">
  <select class="filter-select" id="filter-pillar" onchange="applyFilters()">
    <option value="all">All Pillars</option>
    <option value="education">🎓 Education & Training</option>
    <option value="advocacy">📢 Advocacy & Policy</option>
    <option value="community">🤝 Community & Partnership</option>
    <option value="awareness">💡 Awareness & Campaigns</option>
    <option value="org">📰 Organizational News</option>
  </select>
  <select class="filter-select" id="filter-channel" onchange="applyFilters()">
    <option value="all">All Channels</option>
    <option>LinkedIn</option>
    <option>Newsletter</option>
    <option>Facebook</option>
    <option>Instagram</option>
    <option>Website</option>
  </select>
  <button class="clear-btn" id="clear-btn" onclick="clearFilters()" style="display:none">✕ Clear filters</button>
</div>

<div class="main">
  <div id="view-calendar"></div>
  <div id="view-list" style="display:none"></div>
  <div id="view-keydates" style="display:none"></div>
  <div class="legend">
    <div class="legend-title">Content Pillars</div>
    <div class="legend-pills" id="legend-pills"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal" onclick="closeModalOnOverlay(event,'detail-modal')">
  <div class="modal">
    <div class="modal-top">
      <span class="modal-pillar-tag" id="m-pillar-tag"></span>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-notes" id="m-notes"></div>
    <div class="status-label">STATUS</div>
    <div class="status-buttons" id="m-status-btns"></div>
    <button class="delete-btn" id="m-delete-btn">Delete post</button>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal" onclick="closeModalOnOverlay(event,'add-modal')">
  <div class="modal">
    <div class="modal-top">
      <h3 style="font-size:16px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif" id="add-modal-title">Add post</h3>
      <button class="modal-close" onclick="closeModal('add-modal')">✕</button>
    </div>
    <label class="form-label">Content Title</label>
    <input class="form-input" id="new-title" type="text" placeholder="e.g. Highlights from our training in Brussels">
    <div class="form-row">
      <div>
        <label class="form-label">Channel</label>
        <select class="form-input" id="new-channel" style="margin-bottom:0">
          <option>LinkedIn</option><option>Newsletter</option><option>Facebook</option><option>Instagram</option><option>Website</option>
        </select>
      </div>
      <div>
        <label class="form-label">Pillar</label>
        <select class="form-input" id="new-pillar" style="margin-bottom:0">
          <option value="education">🎓 Education & Training</option>
          <option value="advocacy">📢 Advocacy & Policy</option>
          <option value="community">🤝 Community & Partnership</option>
          <option value="awareness">💡 Awareness & Campaigns</option>
          <option value="org">📰 Organizational News</option>
        </select>
      </div>
    </div>
    <div style="height:12px"></div>
    <label class="form-label">Notes (optional)</label>
    <input class="form-input" id="new-notes" type="text" placeholder="Any tips or reminders for this post">
    <button class="submit-btn" onclick="submitNewPost()">Add to calendar</button>
  </div>
</div>

<script>
const PILLARS = {
  education: { label: "Education & Training", emoji: "🎓", color: "#1B3A6B", bg: "#E8EEF7" },
  advocacy:  { label: "Advocacy & Policy",    emoji: "📢", color: "#6D28D9", bg: "#F3F0FF" },
  community: { label: "Community & Partnership", emoji: "🤝", color: "#0A7A5A", bg: "#E6F7F2" },
  awareness: { label: "Awareness & Campaigns",   emoji: "💡", color: "#C8922A", bg: "#FDF6E3" },
  org:       { label: "Organizational News",      emoji: "📰", color: "#B91C1C", bg: "#FEF2F2" },
};
const STATUSES = [
  { id: "idea",      label: "Idea",      color: "#6B7280", bg: "#F3F4F6" },
  { id: "planned",   label: "Planned",   color: "#2563EB", bg: "#EFF6FF" },
  { id: "writing",   label: "Writing",   color: "#D97706", bg: "#FFF7ED" },
  { id: "ready",     label: "Ready",     color: "#059669", bg: "#ECFDF5" },
  { id: "published", label: "Published", color: "#7C3AED", bg: "#F5F3FF" },
];
const DAYS = ["Mon","Tue","Wed","Thu","Fri"];
const WEEKS = [1,2,3,4];
const KEY_DATES = [
  { date: "Jan 27", label: "Holocaust Remembrance Day", pillar: "awareness" },
  { date: "Mar 21", label: "Int'l Day Against Racism", pillar: "awareness" },
  { date: "Apr 7",  label: "Yom HaShoah", pillar: "awareness" },
  { date: "May 8",  label: "Victory in Europe Day", pillar: "awareness" },
  { date: "Jun 20", label: "World Refugee Day", pillar: "community" },
  { date: "Sep 22", label: "Rosh HaShanah", pillar: "community" },
  { date: "Oct 2",  label: "Yom Kippur", pillar: "community" },
  { date: "Nov 9",  label: "Kristallnacht Anniversary", pillar: "awareness" },
  { date: "Dec 1",  label: "Hanukkah begins", pillar: "community" },
];

let posts = [
  { id:1, week:1, day:"Mon", channel:"LinkedIn",   pillar:"education", title:"What is CEJI? Our mission in 60 seconds", notes:"Short punchy post. Use our elevator pitch. Add a photo of the team or office.", status:"idea" },
  { id:2, week:1, day:"Wed", channel:"LinkedIn",   pillar:"advocacy",  title:"Our contribution to EU antisemitism policy — 2024 highlights", notes:"Link to most recent policy contribution or report. Tag EU institutions if relevant.", status:"idea" },
  { id:3, week:1, day:"Fri", channel:"Newsletter", pillar:"org",       title:"CEJI Monthly Newsletter — Program updates & upcoming opportunities", notes:"One headline story + two program updates + one upcoming event. Keep it under 400 words.", status:"idea" },
  { id:4, week:2, day:"Tue", channel:"LinkedIn",   pillar:"community", title:"Spotlight: partner organization making waves in inclusion training", notes:"Tag the partner org. Ask them to reshare — doubles your reach instantly.", status:"idea" },
  { id:5, week:2, day:"Thu", channel:"Facebook",   pillar:"awareness", title:"Did you know? Key statistic on hate crime in Europe", notes:"Use a stat from Facing Facts or our research. Add a simple graphic if possible.", status:"idea" },
  { id:6, week:3, day:"Mon", channel:"LinkedIn",   pillar:"education", title:"Behind the scenes: how our Facing Facts training works", notes:"Short explainer. Could be a carousel or a short video clip if available.", status:"idea" },
  { id:7, week:3, day:"Wed", channel:"Instagram",  pillar:"community", title:"Team photo or event moment from this week", notes:"Authentic, behind-the-scenes content performs well. No need to be polished.", status:"idea" },
  { id:8, week:4, day:"Tue", channel:"LinkedIn",   pillar:"advocacy",  title:"New publication: key findings from our latest report", notes:"Share 3 bullet-point findings. Link to full report. Tag co-authors or partner orgs.", status:"idea" },
  { id:9, week:4, day:"Fri", channel:"Website",    pillar:"education", title:"Blog post: 3 things educators can do to counter antisemitism in the classroom", notes:"Repurpose existing training content. Aim for 600–800 words. Good for SEO.", status:"idea" },
];

let nextId = 100;
let currentView = "calendar";
let filterPillar = "all";
let filterChannel = "all";
let activePostId = null;
let addContext = null;

function getStatus(id) { return STATUSES.find(s => s.id === id) || STATUSES[0]; }
function getPillar(id) { return PILLARS[id] || PILLARS.education; }

function filteredPosts() {
  return posts.filter(p =>
    (filterPillar === "all" || p.pillar === filterPillar) &&
    (filterChannel === "all" || p.channel === filterChannel)
  );
}

function updateStats() {
  document.getElementById("total-count").textContent = posts.length;
  document.getElementById("pub-count").textContent = posts.filter(p => p.status === "published").length;
  // pillar pills
  const container = document.getElementById("pillar-pills");
  container.innerHTML = "";
  Object.entries(PILLARS).forEach(([id, p]) => {
    const count = posts.filter(post => post.pillar === id).length;
    const el = document.createElement("span");
    el.className = "pillar-pill";
    el.style.cssText = `background:${p.bg};color:${p.color}`;
    el.textContent = `${p.emoji} ${count}`;
    el.title = p.label;
    container.appendChild(el);
  });
  // legend
  const legend = document.getElementById("legend-pills");
  legend.innerHTML = "";
  Object.entries(PILLARS).forEach(([id, p]) => {
    const el = document.createElement("span");
    el.className = "pillar-pill";
    el.style.cssText = `background:${p.bg};color:${p.color}`;
    el.textContent = `${p.emoji} ${p.label}`;
    legend.appendChild(el);
  });
}

function switchView(v) {
  currentView = v;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[["calendar","list","keydates"].indexOf(v)].classList.add("active");
  ["calendar","list","keydates"].forEach(name => {
    document.getElementById(`view-${name}`).style.display = name === v ? "block" : "none";
  });
  renderCurrentView();
}

function applyFilters() {
  filterPillar = document.getElementById("filter-pillar").value;
  filterChannel = document.getElementById("filter-channel").value;
  const hasFilter = filterPillar !== "all" || filterChannel !== "all";
  document.getElementById("clear-btn").style.display = hasFilter ? "inline-block" : "none";
  renderCurrentView();
}

function clearFilters() {
  filterPillar = "all"; filterChannel = "all";
  document.getElementById("filter-pillar").value = "all";
  document.getElementById("filter-channel").value = "all";
  document.getElementById("clear-btn").style.display = "none";
  renderCurrentView();
}

function renderCurrentView() {
  updateStats();
  if (currentView === "calendar") renderCalendar();
  else if (currentView === "list") renderList();
  else renderKeyDates();
}

function renderCalendar() {
  const fp = filteredPosts();
  const container = document.getElementById("view-calendar");
  container.innerHTML = "";
  WEEKS.forEach(week => {
    const wb = document.createElement("div");
    wb.className = "week-block";
    wb.innerHTML = `<div class="week-label">Week ${week}</div>`;
    const grid = document.createElement("div");
    grid.className = "day-grid";
    DAYS.forEach(day => {
      const dayPosts = fp.filter(p => p.week === week && p.day === day);
      const col = document.createElement("div");
      col.className = "day-col";
      col.innerHTML = `<div class="day-header">${day}</div>`;
      const body = document.createElement("div");
      body.className = "day-body";
      dayPosts.forEach(post => {
        const p = getPillar(post.pillar);
        const s = getStatus(post.status);
        const card = document.createElement("div");
        card.className = "post-card";
        card.style.cssText = `background:${p.bg};border-left-color:${p.color}`;
        card.innerHTML = `
          <div class="post-card-channel" style="color:${p.color}">${p.emoji} ${post.channel}</div>
          <div class="post-card-title">${post.title.length > 52 ? post.title.slice(0,52)+"…" : post.title}</div>
          <span class="post-card-status" style="background:${s.bg};color:${s.color}">${s.label}</span>`;
        card.onclick = () => openDetail(post.id);
        body.appendChild(card);
      });
      const addBtn = document.createElement("button");
      addBtn.className = "add-btn";
      addBtn.textContent = "+ Add";
      addBtn.onclick = () => openAddModal(week, day);
      body.appendChild(addBtn);
      col.appendChild(body);
      grid.appendChild(col);
    });
    wb.appendChild(grid);
    container.appendChild(wb);
  });
}

function renderList() {
  const fp = filteredPosts().sort((a,b) => a.week - b.week || DAYS.indexOf(a.day) - DAYS.indexOf(b.day));
  const container = document.getElementById("view-list");
  if (fp.length === 0) { container.innerHTML = `<div class="list-table"><div class="empty-state">No posts match your filters.</div></div>`; return; }
  let rows = fp.map((post, i) => {
    const p = getPillar(post.pillar);
    const s = getStatus(post.status);
    const statusOpts = STATUSES.map(st => `<option value="${st.id}" ${post.status===st.id?"selected":""}>${st.label}</option>`).join("");
    return `<tr>
      <td><span class="week-badge">W${post.week}</span></td>
      <td style="color:var(--gray-500)">${post.day}</td>
      <td>${post.channel}</td>
      <td><span class="pillar-pill" style="background:${p.bg};color:${p.color};cursor:default">${p.emoji} ${p.label}</span></td>
      <td style="max-width:260px">${post.title}</td>
      <td><select class="status-select" style="border-color:${s.color};background:${s.bg};color:${s.color}" onchange="updateStatus(${post.id},this.value)">${statusOpts}</select></td>
      <td><button class="view-btn" onclick="openDetail(${post.id})">View</button></td>
    </tr>`;
  }).join("");
  container.innerHTML = `<div class="list-table"><table>
    <thead><tr><th>Week</th><th>Day</th><th>Channel</th><th>Pillar</th><th>Content Title</th><th>Status</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderKeyDates() {
  const container = document.getElementById("view-keydates");
  const cards = KEY_DATES.map(kd => {
    const p = getPillar(kd.pillar);
    return `<div class="kd-card">
      <div class="kd-icon" style="background:${p.bg}">${p.emoji}</div>
      <div>
        <div class="kd-label">${kd.label}</div>
        <div class="kd-date">${kd.date}, 2025</div>
        <span class="kd-badge" style="background:${p.bg};color:${p.color}">${p.label}</span>
      </div>
    </div>`;
  }).join("");
  container.innerHTML = `
    <div class="key-dates-tip">💡 These are suggested content moments. Plan posts around these dates 1–2 weeks in advance.</div>
    <div class="kd-grid">${cards}</div>
    <div class="kd-tip"><strong>Tip:</strong> For each key date, plan at minimum: one LinkedIn post, one social post (Facebook/Instagram), and a brief mention in the newsletter if it falls in that month's window.</div>`;
}

function openDetail(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  activePostId = id;
  const p = getPillar(post.pillar);
  const s = getStatus(post.status);
  document.getElementById("m-pillar-tag").textContent = `${p.emoji} ${p.label}`;
  document.getElementById("m-pillar-tag").style.color = p.color;
  document.getElementById("m-title").textContent = post.title;
  document.getElementById("m-meta").innerHTML = `
    <span class="meta-badge">📅 Week ${post.week}, ${post.day}</span>
    <span class="meta-badge">${post.channel}</span>`;
  document.getElementById("m-notes").textContent = post.notes || "No notes added.";
  const statusBtns = document.getElementById("m-status-btns");
  statusBtns.innerHTML = "";
  STATUSES.forEach(st => {
    const btn = document.createElement("button");
    btn.className = "status-btn";
    btn.textContent = st.label;
    btn.style.cssText = post.status === st.id
      ? `border:2px solid ${st.color};background:${st.bg};color:${st.color}`
      : `border:2px solid #E5E7EB;background:white;color:var(--gray-500)`;
    btn.onclick = () => { updateStatus(id, st.id); openDetail(id); };
    statusBtns.appendChild(btn);
  });
  document.getElementById("m-delete-btn").onclick = () => deletePost(id);
  document.getElementById("detail-modal").classList.add("open");
}

function updateStatus(id, status) {
  posts = posts.map(p => p.id === id ? {...p, status} : p);
  renderCurrentView();
}

function deletePost(id) {
  posts = posts.filter(p => p.id !== id);
  closeModal("detail-modal");
  renderCurrentView();
}

function openAddModal(week, day) {
  addContext = { week, day };
  document.getElementById("add-modal-title").textContent = `Add post — Week ${week}, ${day}`;
  document.getElementById("new-title").value = "";
  document.getElementById("new-notes").value = "";
  document.getElementById("add-modal").classList.add("open");
}

function submitNewPost() {
  const title = document.getElementById("new-title").value.trim();
  if (!title) return;
  posts.push({
    id: nextId++,
    week: addContext.week,
    day: addContext.day,
    channel: document.getElementById("new-channel").value,
    pillar: document.getElementById("new-pillar").value,
    title,
    notes: document.getElementById("new-notes").value.trim(),
    status: "idea"
  });
  closeModal("add-modal");
  renderCurrentView();
}

function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function closeModalOnOverlay(e, id) { if (e.target === e.currentTarget) closeModal(id); }

// Init
renderCurrentView();
switchView("calendar");
</script>
</body>
</html>
